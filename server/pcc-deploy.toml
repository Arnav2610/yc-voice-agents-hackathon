# Chronos 911 — Pipecat Cloud deployment (Twilio telephony)
#
# From server/:
#   uv run pipecatcloud auth login
#   make deploy-secrets
#   make deploy-cloud
#
# Then configure Twilio with: make pipecat-twiml ORG=your-org-name

agent_name = "chronos-911"
secret_set = "chronos-911-secrets"
agent_profile = "agent-1x"

[krisp_viva]
audio_filter = "tel"

[scaling]
min_agents = 1

[build]
context_dir = "."
dockerfile = "Dockerfile"

[build.exclude]
patterns = ["scripts/", "test_*.py", "*.md", "bot-gpt.py", "bot-nemotron.py", "mock_backend.py"]
